<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel de Administración Completo</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f4; color: #333; }
        .section { background: white; padding: 20px; margin-bottom: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        
        /* Dashboard */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 15px; }
        .stat-card { background: #e9ecef; padding: 15px; border-radius: 8px; border-left: 5px solid #007bff; }
        .stat-card h3 { margin: 0; font-size: 0.9em; color: #666; }
        .stat-card p { margin: 5px 0 0; font-size: 1.4em; font-weight: bold; color: #222; }

        /* Filtros */
        .filters-container { display: flex; gap: 10px; flex-wrap: wrap; background: #f8f9fa; padding: 15px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #ddd; }
        .filter-group { display: flex; flex-direction: column; gap: 5px; }
        .filter-group label { font-size: 0.75em; font-weight: bold; text-transform: uppercase; color: #555; }
        
        /* Tablas e Inputs */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; background: white; font-size: 0.9em; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background: #007bff; color: white; }
        input[type="text"], input[type="number"], select { padding: 6px; border: 1px solid #ccc; border-radius: 4px; }
        
        /* Cards de Pedidos */
        .pedido-card { border-left: 5px solid #17a2b8; padding: 15px; margin: 10px 0; background: #f8fdff; border-radius: 4px; border-bottom: 1px solid #eee; }
        .btn-accion { border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; color: white; }
        
        /* Colores de botones */
        .btn-pago { background: #28a745; }
        .btn-envio { background: #007bff; }
        .btn-entrega { background: #6f42c1; }
        .btn-cancelar { background: #dc3545; }
        .btn-save { background: #28a745; padding: 10px 20px; }
        
        .stock-bajo { background-color: #ffebeb !important; }

        @media print { .no-print { display: none !important; } }
    </style>
</head>
<body>
    <audio id="audio-notificacion" src="alerta.mp3" preload="auto"></audio>
    
    <div style="display: flex; justify-content: space-between; align-items: center;">
        <h1>Panel de Administración 🚀</h1>
        <button class="no-print" onclick="window.print()" style="padding: 10px; cursor: pointer;">🖨️ Imprimir Reporte</button>
    </div>

    <div class="section">
        <div class="stats-grid">
            <div class="stat-card"><h3>💰 Ventas de Hoy</h3><p id="ventas-hoy">$0.00</p></div>
            <div class="stat-card" style="border-left-color: #6f42c1;"><h3>🔥 Más Vendido</h3><p id="top-producto">-</p></div>
            <div class="stat-card" style="border-left-color: #dc3545;"><h3>⚠️ Por Reponer</h3><p id="count-reponer">0 productos</p></div>
        </div>
    </div>

    <div class="section no-print">
        <h2>Gestión de Catálogo</h2>
        <button onclick="document.getElementById('form-nuevo').style.display='block'" style="background:#007bff; color:white; border:none; padding:10px; border-radius:4px; cursor:pointer;">+ Agregar Producto</button>
        
        <div id="form-nuevo" style="display:none; margin-top:15px; padding:15px; border:2px dashed #007bff; border-radius:8px;">
            <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;">
                <input type="text" id="new-title" placeholder="Título">
                <input type="text" id="new-category" placeholder="Sabor">
                <input type="text" id="new-clase" placeholder="Clase">
                <input type="number" step="0.01" id="new-price" placeholder="Precio">
                <input type="number" id="new-stock" placeholder="Stock">
                <input type="text" id="new-image" placeholder="URL Imagen">
            </div>
            <br>
            <button class="btn-save" onclick="crearProducto()">Confirmar Alta</button>
            <button onclick="document.getElementById('form-nuevo').style.display='none'" style="color:red; background:none; border:none; cursor:pointer;">Cancelar</button>
        </div>

        <table id="tabla-productos">
            <thead>
                <tr><th>Título</th><th>Sabor</th><th>Precio</th><th>Stock</th><th class="no-print">Acciones</th></tr>
            </thead>
            <tbody></tbody>
        </table>
        <br>
        <button class="btn-save" onclick="guardarCambios()">💾 Guardar Cambios Inventario</button>
    </div>

    <div class="section">
        <h2>📊 Historial de Pedidos</h2>
        <div class="filters-container no-print">
            <div class="filter-group"><label>Buscar</label><input type="text" id="filter-busqueda" placeholder="Cliente o ID"></div>
            <div class="filter-group">
                <label>Pago</label>
                <select id="filter-pago">
                    <option value="todos">Todos</option>
                    <option value="Pagado">Pagados</option>
                    <option value="pendiente">Pendientes</option>
                </select>
            </div>
            <button class="btn-accion btn-envio" style="align-self: flex-end;" onclick="aplicarFiltros()">🔎 Filtrar</button>
            <button class="btn-accion" style="background:#6c757d; align-self: flex-end;" onclick="limpiarFiltros()">🔄 Reset</button>
            <button class="btn-accion" style="background:#28a745; align-self: flex-end;" onclick="exportarCSV()">📥 Excel</button>
        </div>
        <div id="lista-pedidos">Cargando pedidos...</div>
    </div>

    <script>
        let productosLocales = [];
        let todosLosPedidos = [];
        let cantidadPedidosAnterior = 0;

        async function cargarDatos() {
            try {
                // Cargar Productos
                const resProd = await fetch('http://localhost:3000/api/admin/productos');
                productosLocales = await resProd.json();
                renderizarProductos(productosLocales);

                // Cargar Pedidos
                const resPed = await fetch('http://localhost:3000/api/admin/pedidos');
                todosLosPedidos = await resPed.json();
                
                if (todosLosPedidos.length > cantidadPedidosAnterior && cantidadPedidosAnterior !== 0) {
                    document.getElementById('audio-notificacion').play();
                }
                cantidadPedidosAnterior = todosLosPedidos.length;

                actualizarDashboard();
                renderizarPedidos(todosLosPedidos);
            } catch (error) { console.error("Error:", error); }
        }

        function renderizarProductos(productos) {
            const tbody = document.querySelector('#tabla-productos tbody');
            tbody.innerHTML = productos.map(p => `
                <tr class="${p.stock < 5 ? 'stock-bajo' : ''}" data-id="${p.id}">
                    <td><input type="text" class="edit-title" value="${p.title}"></td>
                    <td><input type="text" class="edit-category" value="${p.category}"></td>
                    <td><input type="number" class="edit-price" value="${p.price}"></td>
                    <td><input type="number" class="edit-stock" value="${p.stock}" style="width:60px"></td>
                    <td class="no-print"><button onclick="eliminarProducto('${p.id}')" style="color:red; cursor:pointer;">Eliminar</button></td>
                </tr>
            `).join('');
        }

        function actualizarDashboard() {
            const hoy = new Date().toLocaleDateString();
            const totalHoy = todosLosPedidos
                .filter(p => new Date(p.fecha).toLocaleDateString() === hoy && p.cancelado === 'No')
                .reduce((sum, p) => sum + parseFloat(p.total.replace('$', '')), 0);
            
            document.getElementById('ventas-hoy').innerText = `$${totalHoy.toFixed(2)}`;
            document.getElementById('count-reponer').innerText = `${productosLocales.filter(p => p.stock < 5).length} productos`;
        }
                                                //////////////////////////////////////////////
        function renderizarPedidos(pedidos) {
            const contenedor = document.getElementById('lista-pedidos');
            contenedor.innerHTML = pedidos.slice().reverse().map(ped => `
                <div class="pedido-card" style="border-left-color: ${ped.cancelado !== 'No' && ped.cancelado !== 'pendiente' ? '#dc3545' : (ped.pago === 'Pagado' ? '#28a745' : '#17a2b8')};">
                    <strong>ID:</strong> ${ped.id} | <strong>Fecha:</strong> ${new Date(ped.fecha).toLocaleString()}<br>
                    <strong>Cliente:</strong> ${ped.cliente} | <strong>Dirección:</strong> ${ped.direccion}<br>
                    <strong>Items:</strong> ${ped.items.map(i => `${i.title} (x${i.cantidad})`).join(', ')}<br>
                    <strong>Total:</strong> <span style="font-weight:bold; color:green;">${ped.total}</span>
                    
                    <div style="background:#eee; padding:10px; margin:10px 0; border-radius:4px; font-size:0.85em;">
                        <b>Pago:</b> ${ped.pago} | <b>Envío:</b> ${ped.enviado} | <b>Entrega:</b> ${ped.entregado}<br>
                        ${ped.receptor ? `<b>Recibió:</b> ${ped.receptor}` : ''}
                        ${ped.cancelado !== 'No' && ped.cancelado !== 'pendiente' ? `<br><b style="color:red">CANCELADO:</b> ${ped.cancelado} | Obs: ${ped.observaciones}` : ''}
                    </div>

                    <div class="no-print" style="display:flex; gap:8px; flex-wrap:wrap; align-items:center;">
                        <button class="btn-accion btn-pago" onclick="cambiarEstado('${ped.id}', 'pago', 'Pagado')">💸 Pagado</button>
                        
                        <button class="btn-accion btn-envio" onclick="cambiarEstado('${ped.id}', 'enviado', '${new Date().toLocaleString()}')">🚚 Enviado</button>
                        
                        <div style="display:flex; gap:2px;">
                            <input type="text" id="rec-${ped.id}" placeholder="Receptor" style="width:100px">
                            <button class="btn-accion btn-entrega" onclick="prepararEntrega('${ped.id}')">🎁 Entregado</button>
                        </div>

                        <div style="display:flex; gap:2px;">
                            <input type="text" id="obs-${ped.id}" placeholder="Motivo" style="width:100px">
                            <button class="btn-accion btn-cancelar" onclick="prepararCancelacion('${ped.id}')">✖ Cancelar</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // LÓGICA DE BOTONES DEL HISTORIAL
        async function cambiarEstado(id, campo, valor, datosExtra = {}) {
            try {
                const res = await fetch(`http://localhost:3000/api/admin/pedidos/${id}/estado`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ campo, valor, ...datosExtra })
                });
                if (res.ok) cargarDatos();
            } catch (e) { console.error(e); }
        }

        function prepararEntrega(id) {
            const r = document.getElementById(`rec-${id}`).value;
            if (!r) return alert("Ingresa quién recibe");
            cambiarEstado(id, 'entregado', new Date().toLocaleString(), { receptor: r });
        }

        function prepararCancelacion(id) {
            const o = document.getElementById(`obs-${id}`).value;
            if (!o) return alert("Ingresa el motivo");
            cambiarEstado(id, 'cancelado', new Date().toLocaleString(), { observaciones: o });
        }

        // OTROS MÉTODOS (GUARDAR, FILTRAR, ETC)
        async function guardarCambios() {
            const filas = document.querySelectorAll('#tabla-productos tbody tr');
            const data = Array.from(filas).map(f => ({
                id: f.dataset.id,
                title: f.querySelector('.edit-title').value,
                category: [f.querySelector('.edit-category').value],
                price: parseFloat(f.querySelector('.edit-price').value),
                stock: parseInt(f.querySelector('.edit-stock').value)
            }));
            const res = await fetch('http://localhost:3000/api/update-products', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });
            if(res.ok) { alert("Inventario guardado"); cargarDatos(); }
        }

        function aplicarFiltros() {
            const busqueda = document.getElementById('filter-busqueda').value.toLowerCase();
            const pago = document.getElementById('filter-pago').value;
            const filtrados = todosLosPedidos.filter(p => {
                const coincideBusqueda = p.cliente.toLowerCase().includes(busqueda) || String(p.id).includes(busqueda);
                const coincidePago = pago === 'todos' || p.pago === pago;
                return coincideBusqueda && coincidePago;
            });
            renderizarPedidos(filtrados);
        }

        function limpiarFiltros() {
            document.getElementById('filter-busqueda').value = "";
            document.getElementById('filter-pago').value = "todos";
            renderizarPedidos(todosLosPedidos);
        }

        cargarDatos();
        setInterval(cargarDatos, 30000);
    </script>
</body>
</html>
