        body { font-family: sans-serif; padding: 20px; background: #f4f4f4; color: #333; }

        .section { background: white; padding: 20px; margin-bottom: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }

       

        /* Dashboard de Stats */

        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 15px; }

        .stat-card { background: #e9ecef; padding: 15px; border-radius: 8px; border-left: 5px solid #007bff; }

        .stat-card h3 { margin: 0; font-size: 0.9em; color: #666; }

        .stat-card p { margin: 5px 0 0; font-size: 1.4em; font-weight: bold; color: #222; }



        /* Filtros de Reportes */

        .filters-container {

            display: flex; gap: 10px; flex-wrap: wrap; background: #f8f9fa;

            padding: 15px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #ddd;

        }

        .filter-group { display: flex; flex-direction: column; gap: 5px; }

        .filter-group label { font-size: 0.75em; font-weight: bold; text-transform: uppercase; color: #555; }

        .btn-report { background: #17a2b8; color: white; border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer; align-self: flex-end; font-weight: bold; }

        .btn-export { background: #28a745 !important; }



        table { width: 100%; border-collapse: collapse; margin-top: 10px; background: white; font-size: 0.9em; }

        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }

        th { background: #007bff; color: white; position: sticky; top: 0; }

        tr:nth-child(even) { background-color: #f9f9f9; }

       

        .stock-bajo { background-color: #ffebeb !important; border-left: 4px solid #dc3545; }

        .stock-label { color: #dc3545; font-weight: bold; font-size: 0.8em; }



        input, select { padding: 6px; border: 1px solid #ccc; border-radius: 4px; }

        .btn-save { background: #28a745; color: white; padding: 10px 20px; border: none; cursor: pointer; border-radius: 4px; font-weight: bold; }

        .badge-ventas { background: #6f42c1; color: white; padding: 3px 8px; border-radius: 10px; font-weight: bold; }

        .pedido-card { border-left: 5px solid #17a2b8; padding: 15px; margin: 10px 0; background: #f8fdff; border-radius: 4px; border-bottom: 1px solid #eee; }



        @media print {

            .no-print, button, input, select, .btn-save, #form-nuevo, .filters-container { display: none !important; }

            body { background: white; padding: 0; }

            .section { box-shadow: none; border: none; }

        }

   




       
    </style>
</head>
<body>
    <nav class="nav-links">
        <a href="pedidos.html">➡ Ir a Pedidos</a>
    </nav>

    <h1>🚀 Dashboard y Productos</h1>

    <div class="section">
        <div class="stats-grid">
            <div class="stat-card"><h3>💰 Ventas de Hoy</h3><p id="ventas-hoy">$0.00</p></div>
            <div class="stat-card" style="border-left-color: #6f42c1;"><h3>🔥 Más Vendido</h3><p id="top-producto">-</p></div>
            <div class="stat-card" style="border-left-color: #dc3545;"><h3>⚠️ Por Reponer</h3><p id="count-reponer">0 productos</p></div>
        </div>
    </div>

    <div class="section">
        <h2>Gestión de Catálogo</h2>
        <button onclick="document.getElementById('form-nuevo').style.display='block'" style="background:#007bff; color:white; border:none; padding:10px; cursor:pointer; border-radius:4px;">+ Nuevo Producto</button>
        
        <div id="form-nuevo" style="display:none; margin-top:15px; padding: 20px; border: 2px dashed #007bff;">
            <input type="text" id="new-title" placeholder="Título">
            <input type="number" id="new-price" placeholder="Precio">
            <input type="number" id="new-stock" placeholder="Stock">
            <button class="btn-save" onclick="crearProducto()">Confirmar Alta</button>
        </div>
    </div>

    <div class="section">
        <h2>Inventario Actual</h2>
      <div style="margin-bottom: 20px; display: flex; gap: 10px; background: #f4f4f4; padding: 15px; border-radius: 8px;">
    <input type="text" id="buscadorNombre" placeholder="🔍 Buscar por gusto (ej: Chocolate)..." 
           style="padding: 10px; flex-grow: 1; border: 1px solid #ccc; border-radius: 5px;">

    <select id="filtroClase" style="padding: 10px; border: 1px solid #ccc; border-radius: 5px;">
        <option value="Todos">Todas las Clases</option>
        <option value="Cremoso">Cremosos 🍦</option>
        <option value="Frutal">Frutales 🍓</option>
        <option value="Agua con Fruta">Agua con Fruta 💧</option>
    </select>
</div>
      
      
      
      
      
      
      
      <table id="tabla-productos">
            <thead>
                <tr>
                    <th>Título</th>
                    <th>Precio</th>
                    <th>Stock</th>
                    <th>Ventas</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
        <br>
        <button class="btn-save" onclick="guardarCambios()">💾 Guardar Cambios Inventario</button>
    </div>

    <script>
 // 1. Variables Globales
    let todosLosProductos = [];
///////////////////////////////////////////

    async function cargarDatos() {
        console.log("🚀 Intentando cargar productos...");
        try {
            const resProd = await fetch('/api/admin/productos');

            // Si no es OK, imprimimos el código de estado
            if (!resProd.ok) {
                console.error("🚩 Error del servidor:", resProd.status, resProd.statusText);
                throw new Error(`Servidor respondió con ${resProd.status}`);
            }

            todosLosProductos = await resProd.json();
            console.log("✅ Productos recibidos:", todosLosProductos.length);

            renderizarProductos(todosLosProductos);

            // Intentamos cargar pedidos
            const resPed = await fetch('/api/admin/pedidos');
            if (resPed.ok) {
                const pedidos = await resPed.json();
                actualizarDashboard(pedidos);
            }
        } catch (error) {
            console.error("❌ Fallo en cargarDatos:", error);
        }
    }
/////////////////////////////////////////
    // 2. Carga inicial de datos
/*    async function cargarDatos() {
        console.log("🚀 Intentando cargar productos de Atlas...");
        try {
            const resProd = await fetch('/api/admin/productos');
            if (!resProd.ok) throw new Error("Error en productos");

    // 3. Dibujar la tabla
    function renderizarProductos(productos) {
        const tbody = document.querySelector('#tabla-productos tbody');
        if (!tbody) return;

        tbody.innerHTML = productos.map(p => {
            
            const nombreMostrado = p.title || (p.category && p.category[0]) || "Sin nombre";
         //   const nombreMostrado = (p.category && p.category.length > 0) ? p.category[0] : (p.title || "Sin nombre");
            return `
                <tr class="${p.stock < 5 ? 'stock-bajo' : ''}" data-id="${p._id}">
                    <td><input type="text" class="edit-title" value="${nombreMostrado}"></td>
                    <td><input type="number" class="edit-price" value="${p.price}"></td>
                    <td><input type="number" class="edit-stock" value="${p.stock}"></td>
                    <td style="text-align:center;">
                        <span class="badge-ventas">${p.ventas || 0}</span>
                    </td>
                    <td><button onclick="eliminarProducto('${p._id}')">🗑️</button></td>
                </tr>
            `;
        }).join('');
    }

    // 4. Guardar cambios masivos (Botón Guardar Cambios Inventario)
    async function guardarCambios() {
        const filas = document.querySelectorAll('#tabla-productos tbody tr');
        const data = Array.from(filas).map(f => ({
            _id: f.dataset.id,
            title: f.querySelector('.edit-title').value,
            price: parseFloat(f.querySelector('.edit-price').value),
            stock: parseInt(f.querySelector('.edit-stock').value)
        }));

        try {
            const res = await fetch('/api/update-products', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            if (res.ok) {
                alert("✅ Inventario actualizado en la nube");
                cargarDatos();
            }
        } catch (error) {
            console.error("Error al guardar:", error);
        }
    }

    // 5. Dashboard, Filtros y CRUD individual
    function actualizarDashboard(pedidos) {
        const hoy = new Date().toLocaleDateString();
        const totalHoy = pedidos
            .filter(p => new Date(p.fecha).toLocaleDateString() === hoy && p.cancelado !== 'Si')
            .reduce((sum, p) => sum + parseFloat(p.total?.toString().replace('$', '') || 0), 0);

        document.getElementById('ventas-hoy').innerText = `$${totalHoy.toFixed(2)}`;
        const stockBajo = todosLosProductos.filter(p => p.stock < 5).length;
        document.getElementById('count-reponer').innerText = `${stockBajo} productos`;
    }

    function filtrar() {
        const texto = document.getElementById('buscadorNombre').value.toLowerCase();
        const claseSeleccionada = document.getElementById('filtroClase').value;
        const filtrados = todosLosProductos.filter(p => {
            const nombreReal = (p.category && p.category.length > 0) ? p.category[0] : (p.title || "");
            const coincideNombre = nombreReal.toLowerCase().includes(texto);
            const coincideClase = (claseSeleccionada === "Todos" || p.clase === claseSeleccionada);
            return coincideNombre && coincideClase;
        });
        renderizarProductos(filtrados);
    }

    async function crearProducto() {
        const nuevo = {
            title: document.getElementById('new-title').value,
            price: parseFloat(document.getElementById('new-price').value),
            stock: parseInt(document.getElementById('new-stock').value),
            category: [document.getElementById('new-title').value],
            ventas: 0
        };
        const res = await fetch('/api/admin/productos', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(nuevo)
        });
        if (res.ok) { location.reload(); }
    }

    async function eliminarProducto(id) {
        if (!confirm("¿Borrar este gusto?")) return;
        const res = await fetch(`/api/admin/productos/${id}`, { method: 'DELETE' });
        if (res.ok) { cargarDatos(); }
    }

    // 6. Event Listeners y arranque
    document.getElementById('buscadorNombre').addEventListener('input', filtrar);
    document.getElementById('filtroClase').addEventListener('change', filtrar);

    // ESTA LÍNEA ES CLAVE: Ejecuta todo al cargar
    cargarDatos();
</script>

   
</body>
