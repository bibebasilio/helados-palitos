<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Actualización Masiva</title>
</head>
<body class="bg-light p-4">

<div class="container">
    <div class="card p-4 shadow-sm mb-4">
        <h4>Actualización Masiva</h4>
        <div class="row">
            <div class="col-md-3"><input type="text" id="filterTitle" class="form-control" placeholder="Título"></div>
            <div class="col-md-3"><input type="text" id="filterClase" class="form-control" placeholder="Clase"></div>
            <div class="col-md-2">
                <select id="updateType" class="form-select" title="Tipo de actualización" aria-label="Tipo de actualización">
                    <option value="PRECIO">Precio</option>
                    <option value="STOCK">Stock</option>
                </select>
            </div>
            <div class="col-md-2"><input type="number" id="newValue" class="form-control" placeholder="Nuevo Valor"></div>
            <div class="col-md-2"><button type="button" id="btnVerificar" class="btn btn-primary w-100">Verificar</button></div>
        </div>
    </div>

    <div id="resultadoListado" class="card p-4 shadow-sm">
        <p class="text-muted">Los resultados aparecerán aquí...</p>
    </div>
</div>

<div class="modal fade" id="confirmModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header"><h5>Confirmar Cambios</h5></div>
      <div class="modal-body" id="modalMensaje"></div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
        <button type="button" class="btn btn-success" id="btnConfirmarFinal">Ejecutar Cambios</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>



<script>
    let datosTemp = {};
    let modal;

    document.addEventListener('DOMContentLoaded', () => {
        const modalEl = document.getElementById('confirmModal');
        if (modalEl) {
            modal = new bootstrap.Modal(modalEl);
        }
    });

    document.getElementById('btnVerificar').addEventListener('click', async () => {
        datosTemp = {
            title: document.getElementById('filterTitle').value.trim(),
            clase: document.getElementById('filterClase').value.trim(),
            tipoActualizacion: document.getElementById('updateType').value,
            nuevoValor: Number(document.getElementById('newValue').value)
        };

        if (isNaN(datosTemp.nuevoValor)) {
            alert('Ingresá un valor numérico válido');
            return;
        }

        const container = document.getElementById('resultadoListado');
        container.innerHTML = `<p>Cargando...</p>`;

        try {
            const res = await fetch('/api/productos/verificar', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(datosTemp)
            });

            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const { count, productos } = await res.json();

            let html = `<h5>Se afectarán: ${count} productos</h5>
                        <table class="table table-hover mt-3">
                            <thead><tr><th>Título</th><th>Clase</th><th>Cat</th><th>Stock</th><th>Precio</th></tr></thead>
                            <tbody>`;

            productos.forEach(p => {
                const claseFila = p.stock < 5 ? 'text-danger fw-bold' : '';
                html += `<tr class="${claseFila}">
                            <td>${p.title}</td><td>${p.clase}</td><td>${p.category}</td>
                            <td>${p.stock}</td><td>${p.precio}</td>
                         </tr>`;
            });

            html += `</tbody></table>`;
            container.innerHTML = html;

            document.getElementById('modalMensaje').innerText =
                `¿Confirma aplicar ${datosTemp.tipoActualizacion}: ${datosTemp.nuevoValor} a estos ${count} productos?`;
            if (modal) modal.show();

        } catch (err) {
            console.error(err);
            container.innerHTML = `<p class="text-danger">Error: ${err.message}</p>`;
        }
    });

    document.getElementById('btnConfirmarFinal').addEventListener('click', async () => {
        const res = await fetch('/api/productos/actualizar', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(datosTemp)
        });
        const data = await res.json();
        alert(`Éxito: Se actualizaron ${data.modifiedCount} productos.`);
        if (modal) modal.hide();
        location.reload();
    });
</script>
</body>
</html>
