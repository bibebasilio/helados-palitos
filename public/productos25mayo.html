        body { font-family: sans-serif; padding: 20px; background: #f4f4f4; color: #333; }

        .section { background: white; padding: 20px; margin-bottom: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }

       

        /* Dashboard de Stats */

        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 15px; }

        .stat-card { background: #e9ecef; padding: 15px; border-radius: 8px; border-left: 5px solid #007bff; }

        .stat-card h3 { margin: 0; font-size: 0.9em; color: #666; }

        .stat-card p { margin: 5px 0 0; font-size: 1.4em; font-weight: bold; color: #222; }



        /* Filtros de Reportes */

        .filters-container {

            display: flex; gap: 10px; flex-wrap: wrap; background: #f8f9fa;

            padding: 15px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #ddd;

        }

        .filter-group { display: flex; flex-direction: column; gap: 5px; }

        .filter-group label { font-size: 0.75em; font-weight: bold; text-transform: uppercase; color: #555; }

        .btn-report { background: #17a2b8; color: white; border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer; align-self: flex-end; font-weight: bold; }

        .btn-export { background: #28a745 !important; }



        table { width: 100%; border-collapse: collapse; margin-top: 10px; background: white; font-size: 0.9em; }

        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }

        th { background: #007bff; color: white; position: sticky; top: 0; }

        tr:nth-child(even) { background-color: #f9f9f9; }

       

        .stock-bajo { background-color: #ffebeb !important; border-left: 4px solid #dc3545; }

        .stock-label { color: #dc3545; font-weight: bold; font-size: 0.8em; }



        input, select { padding: 6px; border: 1px solid #ccc; border-radius: 4px; }

        .btn-save { background: #28a745; color: white; padding: 10px 20px; border: none; cursor: pointer; border-radius: 4px; font-weight: bold; }

        .badge-ventas { background: #6f42c1; color: white; padding: 3px 8px; border-radius: 10px; font-weight: bold; }

        .pedido-card { border-left: 5px solid #17a2b8; padding: 15px; margin: 10px 0; background: #f8fdff; border-radius: 4px; border-bottom: 1px solid #eee; }



        @media print {

            .no-print, button, input, select, .btn-save, #form-nuevo, .filters-container { display: none !important; }

            body { background: white; padding: 0; }

            .section { box-shadow: none; border: none; }

        }

   




       
    </style>
</head>
<body>

    <h1>🚀 Dashboard y Productos</h1>

    <div class="section">
        <div class="stats-grid">
            <div class="stat-card"><h3>💰 Ventas de Hoy</h3><p id="ventas-hoy">$0.00</p></div>
            <div class="stat-card" style="border-left-color: #6f42c1;"><h3>🔥 Más Vendido</h3><p id="top-producto">-</p></div>
            <div class="stat-card" style="border-left-color: #dc3545;"><h3>⚠️ Por Reponer</h3><p id="count-reponer">0 productos</p></div>
        </div>
    </div>
    <div class="section no-print">
    
        <h2>Gestión de Catálogo</h2>
    
        <button onclick="document.getElementById('form-nuevo').style.display='block'"
            style="background:#007bff; color:white; border:none; padding:10px 15px; cursor:pointer; border-radius:4px;">
    
            + Agregar Nuevo Producto
    
        </button>
    
    
    
        <div id="form-nuevo"
            style="display:none; margin-top:15px; padding: 20px; border: 2px dashed #007bff; border-radius: 8px;">
    
            <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px;">
    
                <input type="text" id="new-title" placeholder="Formato">
    
                <input type="text" id="new-category" placeholder="Sabor">
    
                <input type="text" id="new-clase" placeholder="Clase">
    
                <input type="number" step="0.01" id="new-price" placeholder="Precio">
    
                <input type="number" id="new-stock" placeholder="Stock">
    
                <input type="text" id="new-image" placeholder="Ruta Imagen">
    
            </div>
    
            <br>
    
            <button class="btn-save" onclick="crearProducto()">Confirmar Alta</button>
    
            <button onclick="document.getElementById('form-nuevo').style.display='none'"
                style="color:red; background:none; border:none; cursor:pointer; margin-left:15px;">Cancelar</button>
    
        </div>
    
    </div>

    <div class="section">
        <h2>Inventario Actual</h2>
        <table id="tabla-productos">
            <thead>
                <tr>
                    
                    <th>URL</th>

                    <th>Formato</th>

                    <th>Sabor</th>

                    <th>Clase</th>

                    <th>Precio</th>

                    <th>Stock</th>

                    <th>Ventas</th>

                    <th class="no-print">Acciones</th>
        
                </tr>
            </thead>
            <tbody></tbody>
        </table>
        <br>
        <button class="btn-save" onclick="guardarCambios()">💾 Guardar Cambios Inventario</button>
    </div>

    <script>
            let productosLocales = [];

            async function cargarDatos() {
                try {
                    const resProd = await fetch('http://localhost:3000/api/admin/productos');
                    productosLocales = await resProd.json();
                    renderizarProductos(productosLocales);

                    const resPed = await fetch('http://localhost:3000/api/admin/pedidos');
                    const pedidos = await resPed.json();
                    actualizarDashboard(pedidos);
                } catch (error) {
                    console.error("Error cargando datos:", error);
                }
            }

            function renderizarProductos(productos) {
                const tbody = document.querySelector('#tabla-productos tbody');
                tbody.innerHTML = productos.map(p => `
            <tr class="fila-producto ${p.stock < 5 ? 'stock-bajo' : ''}" data-id="${p.id}">
                <td><input type="text" class="edit-image" value="${p.image || ''}"></td>
                <td><input type="text" class="edit-title" value="${p.title || ''}"></td>
                <td><input type="text" class="edit-category" value="${p.category || ''}"></td>
                <td><input type="text" class="edit-clase" value="${p.clase || ''}"></td>
                <td><input type="number" step="0.01" class="edit-price" value="${p.price || 0}"></td>
                <td><input type="number" style="width: 50px;" class="edit-stock" value="${p.stock || 0}"></td>
                <td style="text-align:center;"><span class="badge-ventas">${p.ventas || 0}</span></td>
                <td class="no-print">
                    <button onclick="eliminarProducto('${p.id}')" style="background:#dc3545; color:white; border:none; padding:5px; cursor:pointer; border-radius:4px;">Eliminar</button>
                </td>
            </tr>
        `).join('');
            }

            async function crearProducto() {
                const nuevo = {
                    title: document.getElementById('new-title').value,
                    category: document.getElementById('new-category').value,
                    clase: document.getElementById('new-clase').value,
                    price: parseFloat(document.getElementById('new-price').value),
                    stock: parseInt(document.getElementById('new-stock').value),
                    image: document.getElementById('new-image').value
                };

                const res = await fetch('http://localhost:3000/api/admin/productos', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(nuevo)
                });

                if (res.ok) {
                    alert("Producto agregado correctamente");
                    document.getElementById('form-nuevo').style.display = 'none';
                    cargarDatos();
                } else {
                    alert("Error al agregar producto");
                }
            }

            async function guardarCambios() {
                const filas = document.querySelectorAll('tbody tr');
                const data = Array.from(filas).map(f => ({
                    id: f.dataset.id,
                    image: f.querySelector('.edit-image').value,
                    title: f.querySelector('.edit-title').value,
                    category: f.querySelector('.edit-category').value,
                    clase: f.querySelector('.edit-clase').value,
                    price: parseFloat(f.querySelector('.edit-price').value),
                    stock: parseInt(f.querySelector('.edit-stock').value)
                }));

                const res = await fetch('http://localhost:3000/api/update-products', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                if (res.ok) {
                    alert("Inventario actualizado");
                    cargarDatos();
                } else {
                    alert("Error al guardar cambios");
                }
            }

            async function eliminarProducto(id) {
                if (!confirm("¿Seguro que deseas eliminar este producto?")) return;
                await fetch(`http://localhost:3000/api/admin/productos/${id}`, { method: 'DELETE' });
                cargarDatos();
            }

            function actualizarDashboard(pedidos) {
                const hoy = new Date().toLocaleDateString();
                const totalHoy = pedidos
                    .filter(p => new Date(p.fecha).toLocaleDateString() === hoy && p.cancelado !== 'Si' && p.cancelado !== 'Sí')
                    .reduce((sum, p) => sum + parseFloat(String(p.total).replace('$', '') || 0), 0);

                document.getElementById('ventas-hoy').innerText = `$${totalHoy.toFixed(2)}`;
                const stockBajo = productosLocales.filter(p => p.stock < 5).length;
                document.getElementById('count-reponer').innerText = `${stockBajo} productos`;

                const top = [...productosLocales].sort((a, b) => (b.ventas || 0) - (a.ventas || 0))[0];
                document.getElementById('top-producto').innerText = top ? top.title : '-';
            }

            cargarDatos();
