<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Socios - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .container { margin-top: 30px; }
        .card { margin-bottom: 20px; }
        .btn-action { margin-right: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h2 class="mb-4">Panel de Administración de Socios</h2>

    <div class="card">
        <div class="card-header bg-primary text-white">
            <h5 class="mb-0">Cargar Nuevo Socio</h5>
        </div>
        <div class="card-body">
            <form id="formAsociarse" onsubmit="guardarAsociado(event)">
                <input type="hidden" id="editando_dni" value="">
                ...
                <div class="row g-3">
                    <div class="col-md-4">
                        <label class="form-label">Nombre Completo</label>
                        <input type="text" id="nombre" class="form-control" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">DNI</label>
                        <input type="text" id="dni" class="form-control" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Email</label>
                        <input type="email" id="email" class="form-control" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Teléfono</label>
                        <input type="text" id="telefono" class="form-control">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Dirección</label>
                        <input type="text" id="direccion" class="form-control">
                    </div>
                    <div class="col-md-2">
                        <label class="form-label">Género</label>
                        <select id="genero" class="form-select">
                            <option value="Masculino">Masculino</option>
                            <option value="Femenino">Femenino</option>
                            <option value="Otro">Otro</option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <label class="form-label">Nacimiento</label>
                        <input type="date" id="fecha-nacimiento" class="form-control">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Que tipo helados preferis?</label>
                        <input type="text" id="programa" class="form-control" placeholder="Ej: Cremosos, Sin Lctosa, Al agua, Al agua Con Fruta...">
                    </div>
                    <div class="col-12 text-end">
                        <button type="submit" class="btn btn-success">💾 Guardar Socio</button>
                        <button type="reset" class="btn btn-secondary">Limpiar</button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <div class="card">
        <div class="card-header bg-dark text-white">
            <h5 class="mb-0">Listado de Asociados</h5>
        </div>
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead class="table-light">
                    <tr>
                        <th>Cliente</th>
                        <th>DNI</th>
                        <th>Email</th>
                        <th>Teléfono</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="tabla-asociados">
                    </tbody>
            </table>
        </div>
    </div>
</div>

<script src="/script/asociados_admin.js"></script>
</body>
</html>
