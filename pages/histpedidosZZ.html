<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Historial de Pedidos - Admin</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f4; color: #333; transition: background 0.5s; }
        .nav-bar { background: #333; padding: 10px; border-radius: 8px; margin-bottom: 20px; display: flex; gap: 10px; }
        .nav-bar a { color: white; text-decoration: none; padding: 8px 15px; border-radius: 4px; font-weight: bold; }
        .nav-bar a:hover { background: #555; }
        .nav-bar a.active { background: #007bff; }

        .section { background: white; padding: 20px; margin-bottom: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 15px; }
        .stat-card { background: #e9ecef; padding: 15px; border-radius: 8px; border-left: 5px solid #007bff; }
        .stat-card p { margin: 5px 0 0; font-size: 1.4em; font-weight: bold; }

        .pedido-card { border-left: 5px solid #17a2b8; padding: 15px; margin: 10px 0; background: #f8fdff; border-radius: 4px; border-bottom: 1px solid #eee; }
        
        /* Animación de alerta */
        @keyframes flash-alert {
            0% { background: #f4f4f4; }
            50% { background: #cfe2ff; }
            100% { background: #f4f4f4; }
        }
        .nuevo-pedido-alerta { animation: flash-alert 1.5s ease-in-out 3; }
        
        .filters-container { display: flex; gap: 10px; flex-wrap: wrap; background: #f8f9fa; padding: 15px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #ddd; }
        input, select { padding: 6px; border: 1px solid #ccc; border-radius: 4px; }
        .btn-report { background: #17a2b8; color: white; border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; }

        @media print { .no-print { display: none !important; } }
    </style>
</head>
<body>
    <nav class="nav-bar no-print">
        <a href="histpedidos.html" class="active">📋 Pedidos e Historial</a>
        <a href="catalogo.html">📦 Gestión de Catálogo</a>
    </nav>

    <audio id="audio-notificacion" src="alerta.mp3" preload="auto"></audio>
    
    <div style="display: flex; justify-content: space-between; align-items: center;">
        <h1>📋 Historial de Pedidos</h1>
        <button class="no-print" onclick="window.print()" style="padding: 10px; cursor: pointer; background: #333; color: white; border: none; border-radius: 4px;">🖨️ Imprimir</button>
    </div>

    <div class="section">
        <div class="stats-grid">
            <div class="stat-card"><h3>💰 Ventas Hoy</h3><p id="ventas-hoy">$0.00</p></div>
            <div class="stat-card" style="border-left-color: #6f42c1;"><h3>🔥 Top Producto</h3><p id="top-producto">-</p></div>
        </div>
    </div>

    <div class="section">
        <h2>Filtros de Búsqueda</h2>
        <div class="filters-container no-print">
            <select id="filter-pago"><option value="todos">Todos los pagos</option><option value="Pagado">Pagados</option><option value="Pendiente">Pendientes</option></select>
            <input type="text" id="filter-busqueda" placeholder="Cliente o ID...">
            <button class="btn-report" onclick="aplicarFiltros()">🔎 Filtrar</button>
        </div>
        <div id="lista-pedidos">Cargando...</div>
    </div>

    <script>
        let todosLosPedidos = [];
        let productosLocales = [];
        let cantidadPedidosAnterior = 0;

        async function cargarDatos() {
            try {
                const [resPed, resProd] = await Promise.all([
                    fetch('http://localhost:3000/api/admin/pedidos'),
                    fetch('http://localhost:3000/api/admin/productos')
                ]);
                todosLosPedidos = await resPed.json();
                productosLocales = await resProd.json();

                // Alerta Visual y Sonora si hay nuevos pedidos
                if (todosLosPedidos.length > cantidadPedidosAnterior && cantidadPedidosAnterior !== 0) {
                    document.getElementById('audio-notificacion').play();
                    document.body.classList.add('nuevo-pedido-alerta');
                    setTimeout(() => document.body.classList.remove('nuevo-pedido-alerta'), 4500);
                }
                cantidadPedidosAnterior = todosLosPedidos.length;

                actualizarDashboard();
                renderizarPedidos(todosLosPedidos);
            } catch (e) { console.error(e); }
        }

        function renderizarPedidos(pedidos) {
            const contenedor = document.getElementById('lista-pedidos');
            contenedor.innerHTML = pedidos.slice().reverse().map(ped => `
                <div class="pedido-card" style="border-left-color: ${ped.pago === 'Pagado' ? '#28a745' : '#17a2b8'};">
                    <strong>ID: ${ped.id}</strong> | ${new Date(ped.fecha).toLocaleString()}<br>
                    <strong>Cliente:</strong> ${ped.cliente} | <strong>Total:</strong> <span style="color:green">${ped.total}</span>
                </div>
            `).join('');
        }

        function actualizarDashboard() {
            const hoy = new Date().toLocaleDateString();
            const totalHoy = todosLosPedidos
                .filter(p => new Date(p.fecha).toLocaleDateString() === hoy && p.cancelado === 'No')
                .reduce((sum, p) => sum + parseFloat(String(p.total).replace('$', '').replace(',', '') || 0), 0);
            document.getElementById('ventas-hoy').innerText = `$${totalHoy.toFixed(2)}`;
            const top = [...productosLocales].sort((a, b) => (b.ventas || 0) - (a.ventas || 0))[0];
            document.getElementById('top-producto').innerText = top ? top.title : "-";
        }

        function aplicarFiltros() {
            const pago = document.getElementById('filter-pago').value;
            const busqueda = document.getElementById('filter-busqueda').value.toLowerCase();
            const filtrados = todosLosPedidos.filter(p => {
                let match = true;
                if (busqueda && !String(p.id).includes(busqueda) && !p.cliente.toLowerCase().includes(busqueda)) match = false;
                if (pago !== 'todos' && p.pago !== pago) match = false;
                return match;
            });
            renderizarPedidos(filtrados);
        }

        setInterval(cargarDatos, 10000); // Revisa cada 10 segundos
        cargarDatos();
    </script>
</body>
</html>
