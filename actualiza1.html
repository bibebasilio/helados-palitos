<!DOCTYPE html>
<html lang="es">
<head> 
    <meta charset="UTF-8">
    <title>Actualización Masiva</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
                <
</head>
<body>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
                
    <div class="card p-4">
         <h4>Actualización Masiva</h4>
         <input type="text" id="filterTitle" class="form-control mb-2" placeholder="Title (opcional)">
         <input type="text" id="filterClase" class="form-control mb-2" placeholder="Clase (opcional)">
         
         
         
         
                                <select id="updateType" class="form-select mb-2">
         <option value="PRECIO">Actualizar Precio</option>
         <option value="STOCK">Actualizar Stock</option>
         </select>
         <input type="number" id="newValue" class="form-control mb-2" placeholder="Nuevo Valor">
         <button id="btnVerificar" class="btn btn-primary">Verificar Cambios</button>
    </div>

<div class="modal fade" id="confirmModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
    <div class="modal-content">
    <div class="modal-header"><h5>Confirmar</h5></div>
    <div class="modal-body" id="modalMensaje"></div>
    <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
        <button class="btn btn-success" id="btnConfirmarFinal">Ejecutar</button>
      </div>
    </div>
  </div>
</div>
<body>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
                                      
    <script>
          let datosTemp = {};

document.getElementById('btnVerificar').addEventListener('click', async () => {
    datosTemp = {
        title: document.getElementById('filterTitle').value,
        clase: document.getElementById('filterClase').value,
        tipoActualizacion: document.getElementById('updateType').value,
        nuevoValor: document.getElementById('newValue').value
    };

    const res = await fetch('/api/productos/previsualizar', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(datosTemp)
    });
    const { count } = await res.json();
    
    document.getElementById('modalMensaje').innerText = `Se modificarán ${count} productos. ¿Confirmas?`;
    new bootstrap.Modal(document.getElementById('confirmModal')).show();
});

document.getElementById('btnConfirmarFinal').addEventListener('click', async () => {
    const res = await fetch('/api/productos/actualizar', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(datosTemp)
    });
    const { modifiedCount } = await res.json();
    alert(`Éxito: Se actualizaron ${modifiedCount} productos.`);
    location.reload();
}); 
</script>
 
</body>
</html>
